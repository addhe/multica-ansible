---
- name: Deploy Multica
  tag_env_staging
  become: true
  gather_facts: true
  roles:
    - role: base-role
    - role: multica-db
    - role: multica-backend
    - role: multica-frontend
    - role: multica-cli
  tasks:
    - name: Verify all services running
      community.docker.docker_compose_v2:
        project_src: /opt/multica
        state: present
      register: result
    - name: Display service status
      ansible.builtin.debug:
        var: result
