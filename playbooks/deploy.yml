---
- name: Deploy Multica (staging)
  become: true
  gather_facts: true
  hosts: all
  roles:
    - role: base-role
    - role: multica-db
    - role: multica-backend
    - role: multica-frontend
    - role: multica-cli
  tasks:
    - name: Verify all services running
      community.docker.docker_container_info:
        name: "{{ item }}"
      register: container_status
      loop:
        - multica-postgres
        - multica-backend
        - multica-frontend
      failed_when: container_status.container.State.Running != true

    - name: Display service status
      ansible.builtin.debug:
        msg: "{{ item.container.Name }} — {{ item.container.State.Status }}"
      loop: "{{ container_status.results }}"
