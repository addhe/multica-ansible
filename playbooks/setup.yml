---
# Initial server setup — run once on new VMs
- name: Initial server setup for Multica
  hosts: staging
  become: true
  gather_facts: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - git
          - ca-certificates
          - gnupg
          - lsb-release
          - python3
          - python3-pip
          - python3-venv
        state: present

    - name: Create multica user
      ansible.builtin.user:
        name: multica
        system: true
        shell: /bin/bash
        create_home: true

    - name: Create /opt/multica directory
      ansible.builtin.file:
        path: /opt/multica
        state: directory
        owner: multica
        group: multica
        mode: "0755"

    - name: Deploy environment config
      ansible.builtin.template:
        src: ../templates/.env.j2
        dest: /opt/multica/.env
        owner: multica
        group: multica
        mode: "0600"

    - name: Deploy docker-compose
      ansible.builtin.template:
        src: ../templates/docker-compose.selfhost.yml.j2
        dest: /opt/multica/docker-compose.selfhost.yml
        owner: multica
        group: multica
        mode: "0644"
