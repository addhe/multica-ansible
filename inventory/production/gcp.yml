---
plugin: google.cloud.gcp_compute
projects:
  - ai-core-system-bot-prd
zones:
  - asia-southeast2-a
  - asia-southeast2-b
  - asia-southeast2-c
filters: []
auth_kind: application
scopes:
  - https://www.googleapis.com/auth/compute
  - https://www.googleapis.com/auth/cloud-platform
keyed_groups:
  - key: labels.env
    prefix: env
  - key: labels.role
    prefix: role
  - key: labels.cost_center
    prefix: cost_center
  - key: zone
    prefix: zone
hostnames:
  - name
compose:
  ansible_host: networkInterfaces[0].accessConfigs[0].natIP
