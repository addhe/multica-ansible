---
# Staging Environment Variables — ai-core-system-bot-stg
# All variables live here. Roles must be agnostic — no hardcoding.

# GCP
gcp_project: ai-core-system-bot-stg
gcp_region: asia-southeast2
gcp_zone: asia-southeast2-a

# Environment identifier
env: staging

# Multica
multica_version: latest
multica_image_tag: latest
multica_backend_image: ghcr.io/multica-ai/multica-backend
multica_web_image: ghcr.io/multica-ai/multica-web

# PostgreSQL
postgres_db: multica
postgres_user: multica
postgres_port: 5432

# Backend / Frontend ports
backend_port: 8080
frontend_port: 3000

# App settings
app_env: production
allow_signup: "false"

# URLs — update after DNS/SSL setup
frontend_origin: "http://localhost:3000"
multica_app_url: "http://localhost:3000"

# Secrets are in vault-encrypted files — NEVER hardcode here
# postgres_password: "{{ vault_postgres_password }}"
# jwt_secret: "{{ vault_jwt_secret }}"
# resend_api_key: "{{ vault_resend_api_key }}"
